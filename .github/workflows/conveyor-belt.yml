name: Conveyor Belt QA

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  qa-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install conveyor-belt
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run QA pipeline
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          poetry run cb run --pr ${{ github.event.pull_request.number }} --repo .

      - name: Post results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            try {
              const output = execSync(
                'poetry run cb run --pr ${{ github.event.pull_request.number }} --repo . 2>&1',
                { encoding: 'utf-8', timeout: 600000 }
              );
              // Extract the markdown report (everything after the first ##)
              const reportStart = output.indexOf('## ');
              const report = reportStart >= 0 ? output.slice(reportStart) : output;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            } catch (e) {
              console.log('Pipeline output:', e.stdout || e.message);
            }
