name: Conveyor Belt QA

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  qa-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install conveyor-belt
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run QA pipeline
        id: qa
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          set +e
          poetry run cb run --pr ${{ github.event.pull_request.number }} --repo . 2>&1 | tee /tmp/cb-report.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Post results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const output = fs.readFileSync('/tmp/cb-report.txt', 'utf-8');
              const reportStart = output.indexOf('## ');
              const report = reportStart >= 0 ? output.slice(reportStart) : output;

              if (report.trim()) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: report
                });
              }
            } catch (e) {
              console.log('Could not post report:', e.message);
            }

      - name: Fail if gate failed
        if: steps.qa.outputs.exit_code != '0'
        run: exit 1
